name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: test (${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install PyMuPDF numpy pytest pillow fastapi uvicorn jinja2 httpx python-multipart

      - name: Run tests with details
        run: python -m pytest tests/ -v --tb=short

      - name: Performance benchmarks
        run: python -m pytest tests/benchmarks/ -v --tb=short

      - name: Chaos injection tests
        run: python -m pytest tests/test_chaos.py -v --tb=short

      - name: List test count (sanity check)
        run: python -m pytest tests/ --no-header -q

      - name: All tests passed
        run: 'echo "Tests: passed"'

  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check kzocr/ tests/

  docker:
    runs-on: ubuntu-latest
    name: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build . --tag kzocr:ci
