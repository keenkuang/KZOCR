version: "3.8"

services:
  kzocr:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./db:/app/db
      - ./trace:/app/trace
    environment:
      - KZOCR_DB_DIR=/app/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  worker:
    build: .
    command:
      [
        "celery",
        "-A",
        "kzocr.tcm_ocr.celery_tasks.tasks",
        "worker",
        "-Q",
        "books,pages,maintenance,archival,knowledge",
        "-c",
        "4",
        "--loglevel=info",
      ]
    volumes:
      - ./db:/app/db
      - ./trace:/app/trace
    environment:
      - KZOCR_DB_DIR=/app/db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
