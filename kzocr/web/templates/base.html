<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZOCR Web Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .sidebar { width: 240px; }
        .badge { @apply inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full; }
        .badge-green { @apply badge bg-green-100 text-green-800; }
        .badge-red { @apply badge bg-red-100 text-red-800; }
        .badge-yellow { @apply badge bg-yellow-100 text-yellow-800; }
        .badge-gray { @apply badge bg-gray-100 text-gray-600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar shrink-0 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100">
                <h1 class="text-lg font-bold text-gray-800">KZOCR</h1>
                <p class="text-xs text-gray-400 mt-0.5">中医古籍 OCR 编排系统</p>
            </div>
            <nav class="flex-1 p-3 space-y-1 text-sm">
                <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 {% if request.url.path == '/' %}bg-gray-100 font-medium{% endif %}">
                    <span>📚</span> 书籍列表
                </a>
                <a href="/register" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 {% if '/register' in request.url.path and '/registrations' not in request.url.path %}bg-gray-100 font-medium{% endif %}">
                    <span>📝</span> 书籍登记
                </a>
                <a href="/registrations" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 {% if '/registrations' in request.url.path %}bg-gray-100 font-medium{% endif %}">
                    <span>📋</span> 已登记
                </a>
                <a href="/search" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 {% if '/search' in request.url.path %}bg-gray-100 font-medium{% endif %}">
                    <span>🔍</span> 搜索
                </a>
                <div class="text-xs text-gray-400 uppercase px-3 pt-4 pb-1">工具</div>
                <a href="https://github.com/keenkuang/KZOCR" target="_blank" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 text-gray-500">
                    <span>📖</span> GitHub
                </a>
            </nav>
            <div class="p-3 border-t border-gray-100 text-xs text-gray-400">
                KZOCR v0.8
            </div>
        </aside>

        <!-- Main -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-gray-200 px-6 py-3 shrink-0">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-gray-400">{% block breadcrumb %}运营中心{% endblock %}</p>
                        <h2 class="text-base font-semibold">{% block title %}总览{% endblock %}</h2>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                {% block content %}{% endblock %}
            </main>
            <footer class="border-t bg-white px-6 py-2 shrink-0 text-xs text-gray-400 text-center">
                KZOCR Web Panel · 中医古籍 OCR
            </footer>
        </div>
    </div>
</body>
</html>
