{% extends "base.html" %}
{% block breadcrumb %}运营中心 / OCR 处理{% endblock %}
{% block title %}OCR 处理{% endblock %}
{% block content %}
<div class="bg-white rounded-lg border p-6 max-w-xl">
    <h3 class="text-lg font-semibold mb-4">启动 OCR 处理</h3>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="/pipeline">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">书籍编号</label>
            <div class="flex gap-2">
                <input type="text" name="book_code" list="regCodes" required value="{{ book_code or '' }}" class="flex-1 px-3 py-2 border rounded-md text-sm">
                <datalist id="regCodes">
                    {% for r in registrations %}<option value="{{ r.book_code }}">{% endfor %}
                </datalist>
            </div>
            <p class="text-xs text-gray-400 mt-1">输入已有登记编号，或直接输入新编号</p>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">PDF 路径</label>
            <input type="text" name="pdf_path" required placeholder="/data/books/book.pdf" class="w-full px-3 py-2 border rounded-md text-sm">
            <p class="text-xs text-gray-400 mt-1">服务器上的 PDF 文件绝对路径</p>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">开始处理</button>
            <a href="/" class="px-4 py-2 border rounded-md text-sm text-gray-600 hover:bg-gray-50">取消</a>
        </div>
    </form>
</div>
{% endblock %}
